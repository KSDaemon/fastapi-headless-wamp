# Ruff configuration file
# https://docs.astral.sh/ruff/configuration/

line-length = 120
target-version = "py312"

exclude = [
    ".git",
    ".ruff_cache",
    ".venv",
    "venv",
    "__pycache__",
    "build",
    "dist",
    "examples",
]

[format]
indent-style = "space"
quote-style = "double"
line-ending = "auto"
docstring-code-format = true
docstring-code-line-length = 80
skip-magic-trailing-comma = false

[lint]
select = [
    "E",     # pycodestyle errors
    "W",     # pycodestyle warnings
    "F",     # Pyflakes
    "I",     # isort
    "N",     # pep8-naming
    "UP",    # pyupgrade
    "B",     # flake8-bugbear
    "C4",    # flake8-comprehensions
    "COM",   # flake8-commas
    "T20",   # flake8-print
    "SIM",   # flake8-simplify
    "A",     # flake8-builtins
    "ANN",   # flake8-annotations
    "ARG",   # flake8-unused-arguments
    "FBT",   # flake8-boolean-trap
    "ISC",   # flake8-implicit-str-concat
    "PIE",   # flake8-pie
    "PT",    # flake8-pytest-style
    "PTH",   # flake8-use-pathlib
    "RET",   # flake8-return
    "RSE",   # flake8-raise
    "RUF",   # Ruff-specific rules
    "S",     # flake8-bandit (security)
    "TCH",   # flake8-type-checking
    "TID",   # flake8-tidy-imports
    "PERF",  # perflint
    "PL",    # pylint
]

ignore = [
    "E501",      # line-too-long (handled by formatter)
    "COM812",    # missing-trailing-comma (conflicts with formatter)
    "COM819",    # prohibited-trailing-comma (conflicts with formatter)
    "ISC001",    # single-line-implicit-string-concatenation (conflicts with formatter)
    "T201",      # print statements (we use them in logging/debugging)
    "B008",      # function-call-in-default-argument (common FastAPI pattern)
    "ANN401",    # any-type (WAMP protocol requires Any for dynamic message payloads)
    "PLR2004",   # magic-value-comparison (WAMP protocol codes are inherently magic numbers)
    "PLR0913",   # too-many-arguments (WAMP messages have many fields by spec)
    "S311",      # suspicious-non-cryptographic-random-usage (session IDs don't need crypto random)
]

# Allow unused variables when they start with underscore
dummy-variable-rgx = "^(_+|(_+[a-zA-Z0-9_]*[a-zA-Z0-9]+?))$"

[lint.per-file-ignores]
"scripts/*" = ["T20", "PLR0912"]
"src/fastapi_headless_wamp/hub.py" = ["PLR0911", "PLR0912", "PLR0915"]  # complex WAMP message dispatch
"src/fastapi_headless_wamp/serializers.py" = ["PLC0415", "PLR0911"]  # optional dep imports in __init__, fallback chains

"src/fastapi_headless_wamp/session.py" = ["FBT001", "FBT002"]  # receive_progress keyword arg is fine
"tests/*" = [
    "T20",       # print statements
    "SIM117",    # nested with statements
    "S101",      # assert (expected in tests)
    "ARG001",    # unused function arguments (test callbacks)
    "ARG002",    # unused method arguments (test callbacks)
    "PT017",     # pytest-assert-in-except (common test pattern)
    "PLR0912",   # too-many-branches (complex test setups)
    "PLR0915",   # too-many-statements (complex test setups)
    "RUF006",    # asyncio-dangling-task (intentional in tests)
    "TC001",     # typing-only imports (test runtime needs them)
    "TC003",     # typing-only imports (test runtime needs them)
    "FBT001",    # boolean-type-hint-positional-argument (test helpers)
    "FBT002",    # boolean-default-value-positional-argument (test helpers)
]

[lint.isort]
section-order = [
    "future",
    "standard-library",
    "third-party",
    "first-party",
    "local-folder",
]
force-single-line = false
split-on-trailing-comma = true
combine-as-imports = false

[lint.mccabe]
max-complexity = 15

[lint.pydocstyle]
convention = "google"
